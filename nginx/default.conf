map $http_x_forwarded_proto $ffpro_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 6m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 512;

    # Baseline hardening headers. HSTS is set at the host Nginx (the TLS
    # termination point) — see DEPLOYMENT.md — not here, since this container
    # never speaks TLS directly.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Auth + API calls go to the backend service.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # IMPORTANT: forward the ORIGINAL protocol reported by the upstream
        # (host) reverse proxy rather than this container's own $scheme,
        # which is always "http". Getting this wrong makes the backend think
        # every request is plaintext HTTP, and it will silently refuse to
        # set secure session cookies — logins appear to succeed but no one
        # actually stays signed in.
        proxy_set_header X-Forwarded-Proto $ffpro_forwarded_proto;
        proxy_cookie_path / /;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Static assets, long cache (filenames are content-hashed by Vite).
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback. Never cache index.html so app updates roll out immediately.
    location / {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

