version: '3.8'

services:
  fire-finance:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire-finance-app
    restart: unless-stopped
    ports:
      # Expose host port (default 3010) mapping to container port 3000. 
      # Customize via APP_PORT in your .env file if needed.
      - "${APP_PORT:-3010}:3000"
    networks:
      - proxy_network
    environment:
      - NODE_ENV=production
      
      # Persist Database and Keys
      - DATABASE_FILE=/app/data/database.json
      - ENCRYPTION_KEY_FILE=/app/data/encryption.key
      
      # Master Encryption Keys (Will read from your server's .env file, or auto-generate on boot)
      - SESSION_SECRET=${SESSION_SECRET}
      - DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY}
      
      # Database Connection (Optional real PostgreSQL)
      - DATABASE_URL=${DATABASE_URL}
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=${PGDATABASE}
      
      # Gemini AI Integration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # OAuth - Google Developer Portal
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://199.223.249.193/api/auth/google/callback}
      
      # OAuth - Meta Developer Portal
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - FACEBOOK_CALLBACK_URL=${FACEBOOK_CALLBACK_URL:-http://199.223.249.193/api/auth/facebook/callback}
      
      # Base Application URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://199.223.249.193}
    volumes:
      # Persistent local data directory for database and key persistence
      - ./data:/app/data

networks:
  # Join your existing external Nginx/OpenResty proxy network
  proxy_network:
    external: true
