services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ffpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ffpro_password}
      POSTGRES_DB: ffpro
    volumes:
      - ffpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      # Mount the Apple Sign In private key (.p8) read-only if you're using Apple auth.
      - ./server/secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    # Container-level healthcheck is defined in server/Dockerfile.

  web:
    build: .
    restart: unless-stopped
    container_name: ffpro_web
    depends_on:
      backend:
        condition: service_started
    networks:
      - default
      - proxy_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # No `ports:` — nothing is exposed to the host at all.
    # Nginx Proxy Manager reaches this container over `proxy_network` by its
    # container name (ffpro_web), not via a published host port.

volumes:
  ffpro_pgdata:

networks:
  proxy_network:
    external: true
