services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    container_name: ffpro_postgres
    environment:
      POSTGRES_USER: ffpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ffpro_password}
      POSTGRES_DB: ffpro
    volumes:
      - ffpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffpro"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No "networks:" here -> falls onto the default compose network only,
    # so only the app container (also on default) can reach it. Postgres is
    # never exposed to proxy_network / the outside world.

  app:
    build: .
    restart: unless-stopped
    container_name: ffpro_app
    env_file:
      - ./server/.env
    volumes:
      # Mount the Apple Sign In private key (.p8) read-only if you're using Apple auth.
      - ./server/secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default        # internal network, so it can reach "postgres"
      - proxy_network   # external network, so Nginx Proxy Manager can reach "app:4000"
    # No "ports:" — nothing is published to the host. Nginx Proxy Manager
    # reaches this container directly over proxy_network, by container name
    # ("app" or "ffpro_app") on port 4000, which is what Express actually
    # listens on. This is the fix for "we point to 8080 but the app says
    # port 4000": there is no longer an 8080 anywhere in this stack — point
    # NPM's Proxy Host at "ffpro_app", port 4000, instead.

networks:
  proxy_network:
    external: true

volumes:
  ffpro_pgdata:
