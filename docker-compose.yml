services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    container_name: ffpro_postgres
    environment:
      POSTGRES_USER: ffpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ffpro_password}
      POSTGRES_DB: ffpro
    volumes:
      - ffpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    container_name: ffpro_backend
    env_file:
      - ./server/.env
    volumes:
      # Mount the Apple Sign In private key (.p8) read-only if you're using Apple auth.
      - ./server/secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    # No "ports:" here on purpose — the backend is only reachable from the
    # nginx container over the compose network, never directly from outside.

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    container_name: ffpro_nginx
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      - backend

volumes:
  ffpro_pgdata:
